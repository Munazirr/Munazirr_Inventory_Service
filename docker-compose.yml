version: '3.8'
services:
  inventory:
    build: .
    ports:
      - "3002:3002"
    env_file: .env
    depends_on:
      - postgres
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
      